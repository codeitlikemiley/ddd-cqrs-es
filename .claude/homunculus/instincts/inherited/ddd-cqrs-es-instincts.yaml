# Ddd Cqrs Es Workflow Add Or Update Stack Template And Example

## Action

Follow the add-or-update-stack-template-and-example workflow:
1. Edit or add files in crates/ddd-cli/templates/<stack-name>/** to define the template
2. Edit or add files in examples/<stack-name>-app/** to provide a runnable example
3. Update CLI code (crates/ddd-cli/src/render.rs, etc.) to support the template
4. Update or add test coverage in crates/ddd-cli/tests/cli.rs
5. Optionally update documentation (docs/cli.md) and manifest/model files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: crates/ddd-cli/templates/auth-stack/**, crates/ddd-cli/templates/fullstack/**, examples/auth-stack/**

