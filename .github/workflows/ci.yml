name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Ensure docs script is executable
        run: chmod +x scripts/verify-docs-rust.sh scripts/verify-docs.sh

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Compile library crate
        run: cargo check --all-targets -p ddd_cqrs_es

      - name: Run unit and integration tests
        run: cargo test --all-targets --all-features -p ddd_cqrs_es

      - name: Run doc tests
        run: cargo test --doc --all-features -p ddd_cqrs_es

      - name: Docs hardening validation
        run: bash scripts/verify-docs-rust.sh
