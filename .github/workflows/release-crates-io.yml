name: release-crates-io

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Set to dry-run to validate publish, publish to upload to crates.io"
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Ensure publish helper is executable
        run: chmod +x scripts/release-crates-io.sh

      - name: Run release pipeline (${{ github.event.inputs.mode }})
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/release-crates-io.sh "${{ github.event.inputs.mode }}"

      - name: Print release context
        if: always()
        run: |
          echo "Release mode: ${{ github.event.inputs.mode }}"
          echo "Trigger: ${{ github.event_name }}"
