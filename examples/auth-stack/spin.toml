[component.auth-api.build]
command = "WASI_RUNTIME=spin AUTH_TRANSPORT=both cargo leptos build --release --frontend-only && WASI_RUNTIME=spin AUTH_TRANSPORT=both LEPTOS_OUTPUT_NAME=auth_stack cargo build --lib --target wasm32-wasip2 --release --no-default-features --features ${AUTH_STACK_FEATURES:-ssr,sqlite,spin-grpc}"
watch = ["src/**/*.rs", "Cargo.toml", "proto/**/*.proto"]

