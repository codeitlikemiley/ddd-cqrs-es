syntax = "proto3";

package organization.v1;

service OrganizationService {
  rpc ListOrganizations(ListOrganizationsRequest) returns (OrganizationListResponse);
  rpc CreateOrganization(CreateOrganizationRequest) returns (Organization);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (Organization);
  rpc SelectOrganization(SelectOrganizationRequest) returns (SessionView);
  rpc ListMembers(ListMembersRequest) returns (MembershipListResponse);
  rpc InviteMember(InviteMemberRequest) returns (Invitation);
  rpc ListInvitations(ListInvitationsRequest) returns (InvitationListResponse);
  rpc AcceptInvitation(AcceptInvitationRequest) returns (Organization);
  rpc AssignRole(AssignRoleRequest) returns (Membership);
  rpc RemoveMember(RemoveMemberRequest) returns (AcceptedResponse);
  rpc ListRoles(ListRolesRequest) returns (RoleListResponse);
  rpc UpsertRole(UpsertRoleRequest) returns (Role);
  rpc ListPermissions(ListPermissionsRequest) returns (PermissionListResponse);
}

message ListOrganizationsRequest {}
message CreateOrganizationRequest { string name = 1; }
message UpdateOrganizationRequest { string organization_id = 1; string name = 2; }
message SelectOrganizationRequest { string organization_id = 1; }
message ListMembersRequest { string organization_id = 1; }
message InviteMemberRequest { string organization_id = 1; string email = 2; string role_id = 3; }
message ListInvitationsRequest { string organization_id = 1; }
message AcceptInvitationRequest { string token = 1; }
message AssignRoleRequest { string organization_id = 1; string user_id = 2; string role_id = 3; }
message RemoveMemberRequest { string organization_id = 1; string user_id = 2; }
message ListRolesRequest { string organization_id = 1; }
message UpsertRoleRequest { string organization_id = 1; string role_id = 2; string name = 3; repeated string permissions = 4; }
message ListPermissionsRequest { string organization_id = 1; }

message Organization {
  string organization_id = 1;
  string name = 2;
  string status = 3;
  string current_user_role = 4;
  repeated string permissions = 5;
  uint64 created_at_ms = 6;
}
message OrganizationListResponse { repeated Organization organizations = 1; }
message Membership {
  string organization_id = 1;
  string user_id = 2;
  string primary_email = 3;
  string role_id = 4;
  string status = 5;
  uint64 joined_at_ms = 6;
}
message MembershipListResponse { repeated Membership memberships = 1; }
message Invitation {
  string invitation_id = 1;
  string organization_id = 2;
  string email = 3;
  string role_id = 4;
  string status = 5;
  uint64 expires_at_ms = 6;
}
message InvitationListResponse { repeated Invitation invitations = 1; }
message Role {
  string organization_id = 1;
  string role_id = 2;
  string name = 3;
  bool built_in = 4;
  repeated string permissions = 5;
}
message RoleListResponse { repeated Role roles = 1; }
message PermissionListResponse { repeated string permissions = 1; }
message AcceptedResponse { bool accepted = 1; }
message SessionView {
  bool authenticated = 1;
  string organization_id = 2;
  string user_id = 3;
  string primary_email = 4;
  repeated string permissions = 5;
  string assurance = 6;
  bool system_administrator = 7;
  string session_id = 8;
  uint64 issued_at_unix_seconds = 9;
  uint64 expires_at_unix_seconds = 10;
}
