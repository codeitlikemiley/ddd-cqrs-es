syntax = "proto3";

package audit.v1;

service AuditService {
  rpc ListAuditEvents(ListAuditEventsRequest) returns (AuditEventListResponse);
  rpc WatchAuditEvents(WatchAuditEventsRequest) returns (stream AuditEvent);
}

message ListAuditEventsRequest { string organization_id = 1; uint64 after_cursor = 2; uint32 limit = 3; }
message WatchAuditEventsRequest { string organization_id = 1; uint64 after_cursor = 2; }
message AuditEvent {
  uint64 sequence = 1;
  string organization_id = 2;
  string actor_user_id = 3;
  string action = 4;
  string target_type = 5;
  string target_id = 6;
  string outcome = 7;
  uint64 recorded_at_ms = 8;
}
message AuditEventListResponse { repeated AuditEvent events = 1; uint64 next_cursor = 2; }
