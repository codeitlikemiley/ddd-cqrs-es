services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wasi_auth
      POSTGRES_USER: wasi_auth
      POSTGRES_PASSWORD: wasi_auth_dev
    ports:
      - "127.0.0.1:54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasi_auth -d wasi_auth"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - wasi_auth_postgres:/var/lib/postgresql/data

volumes:
  wasi_auth_postgres:
